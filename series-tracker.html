<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeriesVault</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0f;color:#f0eff4;font-family:system-ui,sans-serif;min-height:100vh}

.header{padding:20px 16px 0;display:flex;justify-content:space-between;align-items:center;gap:8px}
.logo{font-size:1.5rem;font-weight:900;background:linear-gradient(135deg,#e8c97a,#c87d4f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex-shrink:0}
.header-right{display:flex;gap:8px;align-items:center}
.menu-btn{background:#16161a;border:1px solid #2a2a35;color:#f0eff4;font-size:1rem;font-weight:700;width:36px;height:36px;border-radius:10px;cursor:pointer;flex-shrink:0}
.add-btn{background:linear-gradient(135deg,#e8c97a,#c87d4f);border:none;color:#0d0d0f;font-size:.82rem;font-weight:700;padding:9px 16px;border-radius:100px;cursor:pointer;white-space:nowrap}

/* IO MENU */
.io-menu{display:none;position:fixed;top:66px;right:16px;background:#1e1e24;border:1px solid #2a2a35;border-radius:14px;z-index:300;min-width:210px;box-shadow:0 8px 32px rgba(0,0,0,.8);overflow:hidden}
.io-menu.open{display:block}
.io-item{display:block;width:100%;background:none;border:none;border-bottom:1px solid #2a2a35;color:#f0eff4;font-family:system-ui,sans-serif;font-size:.88rem;padding:14px 18px;cursor:pointer;text-align:left}
.io-item:last-child{border-bottom:none}
.io-item:hover{background:#2a2a35}

/* STATS */
.stats{display:flex;margin:14px 16px 0;background:#16161a;border:1px solid #2a2a35;border-radius:14px;overflow:hidden}
.stat{flex:1;text-align:center;padding:11px 6px;border-right:1px solid #2a2a35}
.stat:last-child{border-right:none}
.stat-n{font-size:1.2rem;font-weight:700;line-height:1}
.stat-l{font-size:.58rem;color:#8888a0;text-transform:uppercase;letter-spacing:.7px;margin-top:3px}

/* TYPE TABS */
.type-tabs{display:flex;margin:14px 16px 0;background:#16161a;border:1px solid #2a2a35;border-radius:12px;padding:4px;gap:4px}
.ttab{flex:1;text-align:center;padding:8px 4px;border-radius:9px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;background:none;color:#8888a0;transition:all .2s}
.ttab.active{background:#e8c97a;color:#0d0d0f}

/* STATUS BAR */
.status-bar{display:flex;gap:6px;padding:12px 16px 0;overflow-x:auto;scrollbar-width:none}
.status-bar::-webkit-scrollbar{display:none}
.sbtn{background:#16161a;border:1px solid #2a2a35;color:#8888a0;font-size:.74rem;font-weight:500;padding:7px 13px;border-radius:100px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0}
.sbtn.active{background:#e8c97a;border-color:#e8c97a;color:#0d0d0f}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}

/* CONTROLS */
.controls{display:flex;gap:8px;padding:10px 16px 0;align-items:center}
.sort-select{background:#16161a;border:1px solid #2a2a35;color:#f0eff4;font-size:.76rem;padding:7px 10px;border-radius:10px;outline:none;flex:1;cursor:pointer}
.sort-select option{background:#1e1e24}
.grid-ctrl{display:flex;align-items:center;gap:5px;background:#16161a;border:1px solid #2a2a35;border-radius:10px;padding:5px 8px;flex-shrink:0}
.grid-ctrl span{font-size:.7rem;color:#8888a0;white-space:nowrap}
.grid-ctrl input[type=range]{width:65px;accent-color:#e8c97a;cursor:pointer}

/* RATING LEGEND */
.rating-legend{display:flex;gap:6px;padding:10px 16px 0;overflow-x:auto;scrollbar-width:none;flex-wrap:wrap}
.rating-legend::-webkit-scrollbar{display:none}
.rl{display:flex;align-items:center;gap:4px;font-size:.68rem;color:#8888a0;white-space:nowrap}
.rl-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* SECTION */
.section-title{padding:14px 16px 8px;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#8888a0;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:#2a2a35}

/* GRID */
.grid{display:grid;gap:8px;padding:0 16px}
.card{background:#16161a;border-radius:10px;overflow:hidden;position:relative;cursor:pointer;transition:transform .15s}
.card:active{transform:scale(.97)}
.card-img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
.card-ph{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,#1e1e24,#222230);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:#8888a0}
.card-ph-ico{font-size:1.6rem}
.card-ph-txt{font-size:.62rem;text-transform:uppercase;letter-spacing:1px;text-align:center;padding:0 4px}
.card-status{position:absolute;top:5px;left:5px;font-size:.58rem;font-weight:700;padding:2px 6px;border-radius:5px;text-transform:uppercase}
.card-type{position:absolute;top:5px;right:5px;font-size:.58rem;font-weight:700;padding:2px 5px;border-radius:5px;background:rgba(0,0,0,.75);color:#f0eff4}
.card-rating{position:absolute;bottom:42px;right:5px;font-size:.75rem;font-weight:900;padding:3px 7px;border-radius:7px;color:#fff;letter-spacing:.3px}
.card-info{padding:5px 5px 5px}
.card-info-title{font-size:.72rem;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-info-meta{font-size:.62rem;color:#8888a0;margin-top:1px}

.empty{text-align:center;padding:50px 20px;color:#8888a0;grid-column:1/-1}
.empty-ico{font-size:2.5rem;opacity:.4;margin-bottom:10px}
.empty h3{font-size:1rem;color:#f0eff4;margin-bottom:5px}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:99;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#16161a;border:1px solid #2a2a35;border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;padding:20px 20px 40px}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:1.15rem;font-weight:700}
.xbtn{background:#1e1e24;border:1px solid #2a2a35;color:#8888a0;width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:.9rem}
.type-toggle{display:flex;background:#1e1e24;border:1px solid #2a2a35;border-radius:10px;padding:3px;gap:3px;margin-bottom:14px}
.ttogl{flex:1;text-align:center;padding:8px;border-radius:8px;font-size:.84rem;font-weight:600;cursor:pointer;border:none;background:none;color:#8888a0;transition:all .2s}
.ttogl.active{background:#e8c97a;color:#0d0d0f}
.field{margin-bottom:13px}
.field label{display:block;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:#8888a0;margin-bottom:5px}
.field input,.field select{width:100%;background:#1e1e24;border:1px solid #2a2a35;color:#f0eff4;font-family:system-ui,sans-serif;font-size:.88rem;padding:10px 13px;border-radius:10px;outline:none}
.field input:focus,.field select:focus{border-color:#e8c97a}
.field select option{background:#1e1e24}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.photo-zone{border:2px dashed #2a2a35;border-radius:11px;overflow:hidden;cursor:pointer;position:relative;min-height:76px;display:flex;align-items:center;justify-content:center;background:#1e1e24}
.photo-zone img{width:100%;height:130px;object-fit:cover;display:block}
.photo-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.ph-hint{text-align:center;color:#8888a0;pointer-events:none;padding:12px}
.ph-hint div:first-child{font-size:1.3rem;margin-bottom:4px}
.ph-hint div:last-child{font-size:.74rem}

/* RATING PICKER */
.rating-picker{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.rp{border:2px solid transparent;border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .15s;font-weight:700;font-size:.82rem;color:#fff}
.rp:hover,.rp.active{border-color:#fff;transform:scale(1.06)}
.rp-label{font-size:.6rem;margin-top:3px;opacity:.85;font-weight:500}

.modal-ftr{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.btn-c{background:#1e1e24;border:1px solid #2a2a35;color:#8888a0;font-family:system-ui,sans-serif;font-size:.82rem;padding:10px 18px;border-radius:100px;cursor:pointer}
.btn-s{background:linear-gradient(135deg,#e8c97a,#c87d4f);border:none;color:#0d0d0f;font-family:system-ui,sans-serif;font-size:.82rem;font-weight:700;padding:10px 22px;border-radius:100px;cursor:pointer}
.season-row.hidden{display:none}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#5ecb8d;color:#0d0d0f;font-weight:700;font-size:.85rem;padding:12px 24px;border-radius:100px;z-index:999;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">SeriesVault</div>
  <div class="header-right">
    <button class="menu-btn" id="menu-btn">⋮</button>
    <button class="add-btn" id="add-btn">＋ Ajouter</button>
  </div>
</div>

<!-- IO MENU -->
<div class="io-menu" id="io-menu">
  <button class="io-item" id="btn-export">📤 Exporter en Excel (.csv)</button>
  <button class="io-item" id="btn-import-trigger">📥 Importer depuis Excel (.csv)</button>
  <input type="file" id="btn-import" accept=".csv" style="display:none">
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">Total</div></div>
  <div class="stat"><div class="stat-n" id="s-series" style="color:#e8c97a">0</div><div class="stat-l">Séries</div></div>
  <div class="stat"><div class="stat-n" id="s-films" style="color:#c87d4f">0</div><div class="stat-l">Films</div></div>
  <div class="stat"><div class="stat-n" id="s-cours" style="color:#5ecb8d">0</div><div class="stat-l">En cours</div></div>
</div>

<!-- TYPE TABS -->
<div class="type-tabs">
  <button class="ttab active" data-type="all">Tout</button>
  <button class="ttab" data-type="serie">📺 Séries</button>
  <button class="ttab" data-type="film">🎬 Films</button>
</div>

<!-- STATUS FILTERS -->
<div class="status-bar">
  <button class="sbtn active" data-f="all"><span class="dot" style="background:#8888a0"></span>Tous</button>
  <button class="sbtn" data-f="en-cours"><span class="dot" style="background:#5ecb8d"></span>En cours</button>
  <button class="sbtn" data-f="finit"><span class="dot" style="background:#6ab0e8"></span>Finis</button>
  <button class="sbtn" data-f="en-pause"><span class="dot" style="background:#e8a45a"></span>En pause</button>
</div>

<!-- SORT + GRID -->
<div class="controls">
  <select class="sort-select" id="sort-select">
    <option value="recent">📅 Ajout récent</option>
    <option value="alpha-az">🔤 A → Z</option>
    <option value="alpha-za">🔤 Z → A</option>
    <option value="note-desc">🏆 Note ↓</option>
    <option value="note-asc">🏆 Note ↑</option>
  </select>
  <div class="grid-ctrl">
    <span id="grid-label">3/ligne</span>
    <input type="range" id="grid-size" min="2" max="5" value="3" step="1">
  </div>
</div>

<!-- RATING LEGEND -->
<div class="rating-legend">
  <div class="rl"><div class="rl-dot" style="background:#3b82f6"></div>Chef-d'œuvre (9-10)</div>
  <div class="rl"><div class="rl-dot" style="background:#22c55e"></div>Excellent (7-8)</div>
  <div class="rl"><div class="rl-dot" style="background:#eab308"></div>Bien (5-6)</div>
  <div class="rl"><div class="rl-dot" style="background:#f97316"></div>Moyen (3-4)</div>
  <div class="rl"><div class="rl-dot" style="background:#ef4444"></div>Mauvais (1-2)</div>
  <div class="rl"><div class="rl-dot" style="background:#6b7280"></div>Non noté</div>
</div>

<div id="main-content"></div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="m-title">Nouveau</div>
      <button class="xbtn" id="x-btn">✕</button>
    </div>
    <div class="type-toggle">
      <button class="ttogl active" data-t="serie" id="ttogl-serie">📺 Série</button>
      <button class="ttogl" data-t="film" id="ttogl-film">🎬 Film</button>
    </div>
    <div class="field">
      <label>Titre</label>
      <input id="f-title" type="text" placeholder="Ex: Breaking Bad" autocomplete="off">
    </div>
    <div class="field">
      <label>🖼️ Affiche</label>
      <div class="photo-zone">
        <input type="file" id="f-photo" accept="image/*">
        <div class="ph-hint" id="ph-hint"><div>🎬</div><div>Appuyer pour choisir</div></div>
        <img id="ph-img" style="display:none" alt="">
      </div>
    </div>
    <div class="field">
      <label>Statut</label>
      <select id="f-status">
        <option value="en-cours">🟢 En cours</option>
        <option value="finit">🔵 Fini</option>
        <option value="en-pause">🟠 En pause</option>
      </select>
    </div>
    <div class="two season-row" id="season-row">
      <div class="field">
        <label>📅 Saison</label>
        <input id="f-season" type="number" min="1" max="99" placeholder="1">
      </div>
      <div class="field">
        <label>🎞️ Épisode</label>
        <input id="f-episode" type="number" min="1" max="999" placeholder="1">
      </div>
    </div>
    <div class="field">
      <label>Note /10</label>
      <div class="rating-picker" id="rating-picker">
        <!-- filled by JS -->
      </div>
    </div>
    <div class="modal-ftr">
      <button class="btn-c" id="c-btn">Annuler</button>
      <button class="btn-s" id="s-btn">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var items = [];
try { items = JSON.parse(localStorage.getItem('sv4') || '[]'); } catch(e){}

var filterStatus = 'all';
var filterType = 'all';
var sortMode = 'recent';
var gridCols = 3;
var editId = null;
var rating = 0;
var photo = null;
var modalType = 'serie';

var STATUS = {
  'en-cours': {label:'En cours', color:'#5ecb8d', bg:'rgba(94,203,141,.2)'},
  'finit':    {label:'Fini',     color:'#6ab0e8', bg:'rgba(106,176,232,.2)'},
  'en-pause': {label:'Pause',    color:'#e8a45a', bg:'rgba(232,164,90,.2)'}
};

// Rating color system
function getRatingColor(r){
  if(!r||r===0) return '#6b7280';
  if(r>=9) return '#3b82f6';
  if(r>=7) return '#22c55e';
  if(r>=5) return '#eab308';
  if(r>=3) return '#f97316';
  return '#ef4444';
}
function getRatingLabel(r){
  if(!r||r===0) return '—';
  if(r>=9) return 'Chef-d\'œuvre';
  if(r>=7) return 'Excellent';
  if(r>=5) return 'Bien';
  if(r>=3) return 'Moyen';
  return 'Mauvais';
}

function uid(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }
function saveData(){ try{ localStorage.setItem('sv4', JSON.stringify(items)); }catch(e){} }
function escHtml(t){ return (''+t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg, color){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color||'#5ecb8d';
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

// ---- RATING PICKER BUILD ----
function buildRatingPicker(){
  var picker = document.getElementById('rating-picker');
  picker.innerHTML = '';
  for(var i=1;i<=10;i++){
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'rp';
    btn.setAttribute('data-v', i);
    var col = getRatingColor(i);
    btn.style.background = col;
    btn.innerHTML = '<div>'+i+'</div>';
    btn.addEventListener('click', (function(v){ return function(){ setRating(v); }; })(i));
    picker.appendChild(btn);
  }
  // Add "no rating" button
  var none = document.createElement('button');
  none.type = 'button';
  none.className = 'rp';
  none.setAttribute('data-v', '0');
  none.style.background = '#6b7280';
  none.innerHTML = '<div>—</div>';
  none.addEventListener('click', function(){ setRating(0); });
  picker.appendChild(none);
}

function setRating(v){
  rating = v;
  document.querySelectorAll('.rp').forEach(function(b){
    var bv = parseInt(b.getAttribute('data-v'));
    b.classList.toggle('active', bv===v);
    b.style.opacity = (v===0 || bv===v) ? '1' : '0.45';
  });
}

// ---- SORT ----
function getSorted(data){
  var d = data.slice();
  if(sortMode==='alpha-az') d.sort(function(a,b){return a.title.localeCompare(b.title);});
  else if(sortMode==='alpha-za') d.sort(function(a,b){return b.title.localeCompare(a.title);});
  else if(sortMode==='note-desc') d.sort(function(a,b){return (b.rating||0)-(a.rating||0);});
  else if(sortMode==='note-asc') d.sort(function(a,b){return (a.rating||0)-(b.rating||0);});
  return d;
}

// ---- STATS ----
function updateStats(){
  document.getElementById('s-total').textContent = items.length;
  document.getElementById('s-series').textContent = items.filter(function(x){return x.type==='serie';}).length;
  document.getElementById('s-films').textContent = items.filter(function(x){return x.type==='film';}).length;
  document.getElementById('s-cours').textContent = items.filter(function(x){return x.status==='en-cours';}).length;
}

// ---- RENDER GRID ----
function renderGrid(data, container){
  container.style.gridTemplateColumns = 'repeat('+gridCols+', 1fr)';
  if(data.length===0){
    container.innerHTML = '<div class="empty"><div class="empty-ico">📺</div><h3>Rien ici</h3><p>Ajoute du contenu !</p></div>';
    return;
  }
  container.innerHTML = '';
  getSorted(data).forEach(function(s){
    var st = STATUS[s.status];
    var rCol = getRatingColor(s.rating);
    var card = document.createElement('div');
    card.className = 'card';

    var posterHTML = s.photo
      ? '<img class="card-img" src="'+s.photo+'" alt="">'
      : '<div class="card-ph"><div class="card-ph-ico">'+(s.type==='film'?'🎬':'📺')+'</div><div class="card-ph-txt">'+escHtml(s.title.slice(0,10))+'</div></div>';

    var epMeta = (s.type==='serie' && (s.season||s.episode))
      ? 'S'+(s.season||'?')+' E'+(s.episode||'?')
      : '';

    var ratingBadge = '<div class="card-rating" style="background:'+rCol+'">'+(s.rating||'—')+'</div>';

    card.innerHTML = posterHTML
      + '<div class="card-status" style="background:'+st.bg+';color:'+st.color+'">'+st.label+'</div>'
      + '<div class="card-type">'+(s.type==='film'?'Film':'Série')+'</div>'
      + ratingBadge
      + '<div class="card-info">'
      + '<div class="card-info-title">'+escHtml(s.title)+'</div>'
      + (epMeta?'<div class="card-info-meta">'+epMeta+'</div>':'')
      + '</div>';

    var pressTimer;
    card.addEventListener('touchstart', function(){ pressTimer = setTimeout(function(){ cardMenu(s.id); }, 600); }, {passive:true});
    card.addEventListener('touchend', function(){ clearTimeout(pressTimer); }, {passive:true});
    card.addEventListener('touchmove', function(){ clearTimeout(pressTimer); }, {passive:true});
    card.addEventListener('click', function(){ openModal(s.id); });
    container.appendChild(card);
  });
}

function cardMenu(id){
  var s = items.find(function(x){return x.id===id;});
  if(!s) return;
  if(confirm('Modifier "'+s.title+'" ?\n(Annuler = Supprimer)')){
    openModal(id);
  } else {
    if(confirm('Supprimer "'+s.title+'" définitivement ?')){
      items = items.filter(function(x){return x.id!==id;});
      saveData(); render();
      showToast('🗑 Supprimé', '#ef4444');
    }
  }
}

// ---- RENDER ALL ----
function render(){
  var content = document.getElementById('main-content');
  content.innerHTML = '';
  var filtered = items.filter(function(s){
    return (filterType==='all'||s.type===filterType) && (filterStatus==='all'||s.status===filterStatus);
  });

  if(filterType==='all'){
    var ser = filtered.filter(function(x){return x.type==='serie';});
    var fil = filtered.filter(function(x){return x.type==='film';});
    if(ser.length===0 && fil.length===0){
      content.innerHTML='<div class="empty" style="padding:60px 20px"><div class="empty-ico">📺</div><h3>Rien à afficher</h3><p>Ajoute ta première série ou film !</p></div>';
    } else {
      if(ser.length>0){
        var st=document.createElement('div'); st.className='section-title';
        st.textContent='📺 Séries ('+ser.length+')'; content.appendChild(st);
        var sg=document.createElement('div'); sg.className='grid'; content.appendChild(sg);
        renderGrid(ser,sg);
      }
      if(fil.length>0){
        var ft=document.createElement('div'); ft.className='section-title';
        ft.textContent='🎬 Films ('+fil.length+')'; content.appendChild(ft);
        var fg=document.createElement('div'); fg.className='grid'; content.appendChild(fg);
        renderGrid(fil,fg);
      }
    }
  } else {
    var g=document.createElement('div'); g.className='grid'; content.appendChild(g);
    renderGrid(filtered,g);
  }
  updateStats();
}

// ---- MODAL ----
function setModalType(t){
  modalType=t;
  document.querySelectorAll('.ttogl').forEach(function(b){ b.classList.toggle('active',b.getAttribute('data-t')===t); });
  document.getElementById('season-row').classList.toggle('hidden',t==='film');
  if(!editId) document.getElementById('m-title').textContent=(t==='film'?'Nouveau film':'Nouvelle série');
}

function openModal(id){
  editId=id||null; rating=0; photo=null;
  buildRatingPicker();
  document.getElementById('f-title').value='';
  document.getElementById('f-status').value='en-cours';
  document.getElementById('f-season').value='';
  document.getElementById('f-episode').value='';
  document.getElementById('ph-img').style.display='none';
  document.getElementById('ph-hint').style.display='block';
  document.getElementById('f-photo').value='';
  setRating(0); setModalType('serie');

  if(id){
    var s=items.find(function(x){return x.id===id;});
    if(s){
      document.getElementById('m-title').textContent='Modifier';
      document.getElementById('f-title').value=s.title;
      document.getElementById('f-status').value=s.status;
      document.getElementById('f-season').value=s.season||'';
      document.getElementById('f-episode').value=s.episode||'';
      photo=s.photo||null;
      setModalType(s.type||'serie');
      setRating(s.rating||0);
      if(s.photo){
        document.getElementById('ph-img').src=s.photo;
        document.getElementById('ph-img').style.display='block';
        document.getElementById('ph-hint').style.display='none';
      }
    }
  } else {
    document.getElementById('m-title').textContent='Nouveau';
  }
  document.getElementById('overlay').classList.add('open');
}

function closeModal(){ document.getElementById('overlay').classList.remove('open'); }

// ---- EXPORT CSV ----
function exportCSV(){
  if(items.length===0){ showToast('⚠️ Rien à exporter','#e8a45a'); return; }
  var rows = [['Titre','Type','Statut','Saison','Episode','Note','Label note']];
  items.forEach(function(s){
    rows.push([
      '"'+s.title.replace(/"/g,'""')+'"',
      s.type==='film'?'Film':'Série',
      s.status==='en-cours'?'En cours':s.status==='finit'?'Fini':'En pause',
      s.season||'',
      s.episode||'',
      s.rating||'',
      s.rating?getRatingLabel(s.rating):''
    ]);
  });
  var csv = rows.map(function(r){return r.join(',');}).join('\n');
  var blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href=url; a.download='SeriesVault.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('✅ Export réussi ! ('+items.length+' éléments)');
  document.getElementById('io-menu').classList.remove('open');
}

// ---- IMPORT CSV ----
function importCSV(file){
  var reader = new FileReader();
  reader.onload = function(e){
    var lines = e.target.result.replace(/^\uFEFF/,'').split('\n');
    var count = 0;
    for(var i=1;i<lines.length;i++){
      var line = lines[i].trim();
      if(!line) continue;
      // Handle quoted fields
      var cols = [];
      var inQ = false, cur = '';
      for(var c=0;c<line.length;c++){
        if(line[c]==='"'){ inQ=!inQ; }
        else if(line[c]===','&&!inQ){ cols.push(cur); cur=''; }
        else { cur+=line[c]; }
      }
      cols.push(cur);
      if(!cols[0]) continue;
      var typeRaw = (cols[1]||'').toLowerCase();
      var statusRaw = (cols[2]||'').toLowerCase();
      var obj = {
        id: uid(),
        title: cols[0]||'',
        type: typeRaw.indexOf('film')!==-1?'film':'serie',
        status: statusRaw.indexOf('cours')!==-1?'en-cours':statusRaw.indexOf('pause')!==-1?'en-pause':'finit',
        season: parseInt(cols[3])||null,
        episode: parseInt(cols[4])||null,
        rating: parseInt(cols[5])||0,
        photo: null
      };
      // Avoid duplicates by title
      var exists = items.find(function(x){ return x.title.toLowerCase()===obj.title.toLowerCase(); });
      if(!exists){ items.push(obj); count++; }
    }
    saveData(); render();
    showToast('📥 '+count+' éléments importés !');
  };
  reader.readAsText(file, 'UTF-8');
  document.getElementById('io-menu').classList.remove('open');
}
