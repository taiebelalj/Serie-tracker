<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeriesVault</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0f;color:#f0eff4;font-family:system-ui,sans-serif;min-height:100vh}

#app{padding:28px 20px 60px}

.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.logo{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,#e8c97a,#c87d4f);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stats{display:flex;gap:20px}
.stat{text-align:right}
.stat-n{font-size:1.4rem;font-weight:700;color:#e8c97a;line-height:1}
.stat-l{font-size:.65rem;color:#8888a0;text-transform:uppercase;letter-spacing:1px}

.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;align-items:center}
.fbtn{background:#16161a;border:1px solid #2a2a35;color:#8888a0;font-size:.8rem;font-weight:500;padding:9px 18px;border-radius:100px;cursor:pointer;display:flex;align-items:center;gap:6px}
.fbtn.active{background:#e8c97a;border-color:#e8c97a;color:#0d0d0f}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.add-btn{margin-left:auto;background:linear-gradient(135deg,#e8c97a,#c87d4f);border:none;color:#0d0d0f;font-size:.9rem;font-weight:700;padding:10px 22px;border-radius:100px;cursor:pointer}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px}
.card{background:#16161a;border:1px solid #2a2a35;border-radius:14px;overflow:hidden}
.card-img{width:100%;height:180px;object-fit:cover;display:block}
.card-ph{width:100%;height:180px;background:#1e1e24;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#8888a0;font-size:2rem}
.card-ph span{font-size:.75rem;text-transform:uppercase;letter-spacing:1px}
.card-body{padding:14px 16px 16px}
.card-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-title{font-size:1rem;font-weight:700;flex:1;line-height:1.3}
.card-acts{display:flex;gap:5px}
.ibtn{background:#1e1e24;border:1px solid #2a2a35;color:#8888a0;width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:.75rem}
.card-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.badge{font-size:.68rem;font-weight:600;padding:3px 9px;border-radius:100px;text-transform:uppercase;letter-spacing:.5px}
.ep{font-size:.75rem;color:#8888a0;background:#1e1e24;padding:2px 8px;border-radius:6px}
.stars{margin-top:10px;display:flex;gap:2px;flex-wrap:wrap}
.star{font-size:.75rem;color:#2a2a35}
.star.on{color:#e8c97a}

.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:#8888a0}
.empty-ico{font-size:3rem;opacity:.5;margin-bottom:12px}
.empty h3{font-size:1.2rem;color:#f0eff4;margin-bottom:6px}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:99;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:#16161a;border:1px solid #2a2a35;border-radius:20px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding:24px}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:1.3rem;font-weight:700}
.xbtn{background:#1e1e24;border:1px solid #2a2a35;color:#8888a0;width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:1rem}
.field{margin-bottom:16px}
.field label{display:block;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:#8888a0;margin-bottom:6px}
.field input,.field select{width:100%;background:#1e1e24;border:1px solid #2a2a35;color:#f0eff4;font-family:system-ui,sans-serif;font-size:.9rem;padding:11px 14px;border-radius:11px;outline:none}
.field input:focus,.field select:focus{border-color:#e8c97a}
.field select option{background:#1e1e24}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.photo-zone{border:2px dashed #2a2a35;border-radius:12px;overflow:hidden;cursor:pointer;position:relative;min-height:90px;display:flex;align-items:center;justify-content:center;background:#1e1e24}
.photo-zone img{width:100%;height:150px;object-fit:cover;display:block}
.photo-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-hint{text-align:center;color:#8888a0;pointer-events:none;padding:16px}
.photo-hint div:first-child{font-size:1.6rem;margin-bottom:6px}
.photo-hint div:last-child{font-size:.8rem}
.star-pick{display:flex;gap:8px}
.sp{font-size:1.2rem;cursor:pointer;color:#2a2a35;transition:color .1s}
.sp.on{color:#e8c97a}
.modal-ftr{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn-c{background:#1e1e24;border:1px solid #2a2a35;color:#8888a0;font-family:system-ui,sans-serif;font-size:.85rem;padding:10px 20px;border-radius:100px;cursor:pointer}
.btn-s{background:linear-gradient(135deg,#e8c97a,#c87d4f);border:none;color:#0d0d0f;font-family:system-ui,sans-serif;font-size:.85rem;font-weight:700;padding:10px 24px;border-radius:100px;cursor:pointer}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">Series<span style="font-weight:400;font-style:italic">Vault</span></div>
    <div class="stats">
      <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">Total</div></div>
      <div class="stat"><div class="stat-n" id="s-cours" style="color:#5ecb8d">0</div><div class="stat-l">En cours</div></div>
      <div class="stat"><div class="stat-n" id="s-finit" style="color:#6ab0e8">0</div><div class="stat-l">Finies</div></div>
    </div>
  </div>

  <div class="filters">
    <button class="fbtn active" data-f="all"><span class="dot" style="background:#8888a0"></span>Toutes</button>
    <button class="fbtn" data-f="en-cours"><span class="dot" style="background:#5ecb8d"></span>En cours</button>
    <button class="fbtn" data-f="finit"><span class="dot" style="background:#6ab0e8"></span>Finies</button>
    <button class="fbtn" data-f="en-pause"><span class="dot" style="background:#e8a45a"></span>En pause</button>
    <button class="add-btn" id="add-btn">＋ Ajouter</button>
  </div>

  <div class="grid" id="grid"></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal-box">
    <div class="modal-hdr">
      <div class="modal-title" id="m-title">Nouvelle série</div>
      <button class="xbtn" id="x-btn">✕</button>
    </div>
    <div class="field">
      <label>📺 Titre</label>
      <input id="f-title" type="text" placeholder="Ex: Breaking Bad" autocomplete="off">
    </div>
    <div class="field">
      <label>🖼️ Affiche</label>
      <div class="photo-zone" id="photo-zone">
        <input type="file" id="f-photo" accept="image/*">
        <div class="photo-hint" id="ph-hint"><div>🎬</div><div>Appuyer pour choisir</div></div>
        <img id="ph-img" style="display:none" alt="">
      </div>
    </div>
    <div class="field">
      <label>📊 Statut</label>
      <select id="f-status">
        <option value="en-cours">🟢 En cours</option>
        <option value="finit">🔵 Finie</option>
        <option value="en-pause">🟠 En pause</option>
      </select>
    </div>
    <div class="two">
      <div class="field">
        <label>📅 Saison</label>
        <input id="f-season" type="number" min="1" max="99" placeholder="1">
      </div>
      <div class="field">
        <label>🎞️ Épisode</label>
        <input id="f-episode" type="number" min="1" max="999" placeholder="1">
      </div>
    </div>
    <div class="field">
      <label>⭐ Note</label>
      <div class="star-pick" id="star-pick">
        <span class="sp" data-v="1">★</span>
        <span class="sp" data-v="2">★</span>
        <span class="sp" data-v="3">★</span>
        <span class="sp" data-v="4">★</span>
        <span class="sp" data-v="5">★</span>
        <span class="sp" data-v="6">★</span>
        <span class="sp" data-v="7">★</span>
        <span class="sp" data-v="8">★</span>
        <span class="sp" data-v="9">★</span>
        <span class="sp" data-v="10">★</span>
      </div>
    </div>
    <div class="modal-ftr">
      <button class="btn-c" id="c-btn">Annuler</button>
      <button class="btn-s" id="s-btn">Enregistrer</button>
    </div>
  </div>
</div>

<script>
var series = [];
try { series = JSON.parse(localStorage.getItem('seriesvault') || '[]'); } catch(e) { series = []; }
var filter = 'all';
var editId = null;
var rating = 0;
var photo = null;

function saveData() {
  try { localStorage.setItem('seriesvault', JSON.stringify(series)); } catch(e) {}
}

var STATUS = {
  'en-cours': {label:'En cours', color:'#5ecb8d', bg:'rgba(94,203,141,.15)', br:'rgba(94,203,141,.3)'},
  'finit':    {label:'Finie',    color:'#6ab0e8', bg:'rgba(106,176,232,.15)',br:'rgba(106,176,232,.3)'},
  'en-pause': {label:'En pause', color:'#e8a45a', bg:'rgba(232,164,90,.15)', br:'rgba(232,164,90,.3)'}
};

function uid(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }

function updateStats(){
  document.getElementById('s-total').textContent = series.length;
  document.getElementById('s-cours').textContent = series.filter(function(s){return s.status==='en-cours';}).length;
  document.getElementById('s-finit').textContent = series.filter(function(s){return s.status==='finit';}).length;
}

function renderGrid(){
  var grid = document.getElementById('grid');
  var data = filter==='all' ? series : series.filter(function(s){return s.status===filter;});
  if(data.length===0){
    grid.innerHTML = '<div class="empty"><div class="empty-ico">📺</div><h3>Aucune série</h3><p>Ajoute ta première série !</p></div>';
  } else {
    var html = '';
    for(var i=0;i<data.length;i++){
      var s = data[i];
      var st = STATUS[s.status];
      var poster = s.photo
        ? '<img class="card-img" src="'+s.photo+'" alt="">'
        : '<div class="card-ph"><span style="font-size:2rem">🎬</span><span>'+s.title.slice(0,2).toUpperCase()+'</span></div>';
      var ep = (s.season||s.episode) ? '<span class="ep">S'+(s.season||'?')+' E'+(s.episode||'?')+'</span>' : '';
      var stars = '';
      for(var j=1;j<=10;j++) stars += '<span class="star'+(j<=s.rating?' on':'')+'">★</span>';
      html += '<div class="card">'
        +poster
        +'<div class="card-body">'
        +'<div class="card-row">'
        +'<div class="card-title">'+escHtml(s.title)+'</div>'
        +'<div class="card-acts">'
        +'<button class="ibtn" data-edit="'+s.id+'">✏️</button>'
        +'<button class="ibtn" data-del="'+s.id+'">🗑</button>'
        +'</div></div>'
        +'<div class="card-meta"><span class="badge" style="background:'+st.bg+';color:'+st.color+';border:1px solid '+st.br+'">'+st.label+'</span>'+ep+'</div>'
        +'<div class="stars">'+stars+'</div>'
        +'</div></div>';
    }
    grid.innerHTML = html;
    grid.querySelectorAll('[data-edit]').forEach(function(b){
      b.addEventListener('click', function(e){
        e.stopPropagation();
        openModal(this.getAttribute('data-edit'));
      });
    });
    grid.querySelectorAll('[data-del]').forEach(function(b){
      b.addEventListener('click', function(e){
        e.stopPropagation();
        var id = this.getAttribute('data-del');
        var s = series.find(function(x){return x.id===id;});
        if(s && confirm('Supprimer "'+s.title+'" ?')){
          series = series.filter(function(x){return x.id!==id;});
          saveData(); renderGrid();
        }
      });
    });
  }
  updateStats();
}

function escHtml(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setRating(v){
  rating = v;
  document.querySelectorAll('.sp').forEach(function(s){
    s.classList.toggle('on', parseInt(s.getAttribute('data-v'))<=v);
  });
}

function openModal(id){
  editId = id||null; rating=0; photo=null;
  document.getElementById('f-title').value='';
  document.getElementById('f-status').value='en-cours';
  document.getElementById('f-season').value='';
  document.getElementById('f-episode').value='';
  document.getElementById('ph-img').style.display='none';
  document.getElementById('ph-hint').style.display='block';
  document.getElementById('f-photo').value='';
  setRating(0);
  if(id){
    var s=series.find(function(x){return x.id===id;});
    if(s){
      document.getElementById('m-title').textContent='Modifier';
      document.getElementById('f-title').value=s.title;
      document.getElementById('f-status').value=s.status;
      document.getElementById('f-season').value=s.season||'';
      document.getElementById('f-episode').value=s.episode||'';
      photo=s.photo||null; setRating(s.rating||0);
      if(s.photo){
        document.getElementById('ph-img').src=s.photo;
        document.getElementById('ph-img').style.display='block';
        document.getElementById('ph-hint').style.display='none';
      }
    }
  } else {
    document.getElementById('m-title').textContent='Nouvelle série';
  }
  document.getElementById('overlay').classList.add('open');
}

function closeModal(){ document.getElementById('overlay').classList.remove('open'); }

// Events
document.getElementById('add-btn').addEventListener('click', function(){ openModal(null); });
document.getElementById('x-btn').addEventListener('click', closeModal);
document.getElementById('c-btn').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

document.querySelectorAll('.fbtn').forEach(function(b){
  b.addEventListener('click', function(){
    filter=this.getAttribute('data-f');
    document.querySelectorAll('.fbtn').forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');
    renderGrid();
  });
});

document.querySelectorAll('.sp').forEach(function(s){
  s.addEventListener('click', function(){ setRating(parseInt(this.getAttribute('data-v'))); });
  s.addEventListener('mouseover', function(){
    var v=parseInt(this.getAttribute('data-v'));
    document.querySelectorAll('.sp').forEach(function(x){ x.classList.toggle('on', parseInt(x.getAttribute('data-v'))<=v); });
  });
  s.addEventListener('mouseout', function(){
    document.querySelectorAll('.sp').forEach(function(x){ x.classList.toggle('on', parseInt(x.getAttribute('data-v'))<=rating); });
  });
});

document.getElementById('f-photo').addEventListener('change', function(e){
  var file=e.target.files[0]; if(!file) return;
  var r=new FileReader();
  r.onload=function(ev){
    photo=ev.target.result;
    document.getElementById('ph-img').src=photo;
    document.getElementById('ph-img').style.display='block';
    document.getElementById('ph-hint').style.display='none';
  };
  r.readAsDataURL(file);
});

document.getElementById('s-btn').addEventListener('click', function(){
  var t=document.getElementById('f-title').value.trim();
  if(!t){ document.getElementById('f-title').focus(); return; }
  var obj={
    id: editId||uid(),
    title:t,
    status:document.getElementById('f-status').value,
    season:parseInt(document.getElementById('f-season').value)||null,
    episode:parseInt(document.getElementById('f-episode').value)||null,
    rating:rating, photo:photo
  };
  if(editId){
    var idx=series.findIndex(function(x){return x.id===editId;});
    if(idx!==-1) series[idx]=obj;
  } else { series.unshift(obj); }
  saveData(); closeModal(); renderGrid();
});

renderGrid();
</script>
</body>
</html>
