<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeriesVault</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0f;color:#f0eff4;font-family:system-ui,sans-serif;min-height:100vh}

/* HEADER */
.header{padding:20px 16px 0;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,#e8c97a,#c87d4f);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-right{display:flex;gap:10px;align-items:center}
.icon-btn{background:none;border:none;color:#8888a0;font-size:1.2rem;cursor:pointer;padding:6px}
.add-btn{background:linear-gradient(135deg,#e8c97a,#c87d4f);border:none;color:#0d0d0f;font-size:.85rem;font-weight:700;padding:9px 18px;border-radius:100px;cursor:pointer}

/* STATS */
.stats{display:flex;gap:0;margin:16px 16px 0;background:#16161a;border:1px solid #2a2a35;border-radius:14px;overflow:hidden}
.stat{flex:1;text-align:center;padding:12px 8px;border-right:1px solid #2a2a35}
.stat:last-child{border-right:none}
.stat-n{font-size:1.3rem;font-weight:700;line-height:1}
.stat-l{font-size:.6rem;color:#8888a0;text-transform:uppercase;letter-spacing:.8px;margin-top:3px}

/* TYPE TABS */
.type-tabs{display:flex;margin:16px 16px 0;background:#16161a;border:1px solid #2a2a35;border-radius:12px;padding:4px;gap:4px}
.ttab{flex:1;text-align:center;padding:8px 4px;border-radius:9px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;background:none;color:#8888a0;transition:all .2s}
.ttab.active{background:#e8c97a;color:#0d0d0f}

/* STATUS FILTERS */
.status-bar{display:flex;gap:6px;padding:14px 16px 0;overflow-x:auto;scrollbar-width:none}
.status-bar::-webkit-scrollbar{display:none}
.sbtn{background:#16161a;border:1px solid #2a2a35;color:#8888a0;font-size:.75rem;font-weight:500;padding:7px 14px;border-radius:100px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0}
.sbtn.active{background:#e8c97a;border-color:#e8c97a;color:#0d0d0f}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}

/* SORT & GRID CONTROLS */
.controls{display:flex;gap:8px;padding:12px 16px 0;align-items:center}
.sort-select{background:#16161a;border:1px solid #2a2a35;color:#f0eff4;font-size:.78rem;padding:7px 10px;border-radius:10px;outline:none;flex:1;cursor:pointer}
.sort-select option{background:#1e1e24}
.grid-ctrl{display:flex;align-items:center;gap:6px;background:#16161a;border:1px solid #2a2a35;border-radius:10px;padding:5px 10px}
.grid-ctrl span{font-size:.72rem;color:#8888a0;white-space:nowrap}
.grid-ctrl input[type=range]{width:70px;accent-color:#e8c97a;cursor:pointer}

/* SECTION TITLES */
.section-title{padding:16px 16px 8px;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#8888a0;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:#2a2a35}

/* GRID */
.grid{display:grid;gap:8px;padding:0 16px}

/* CARD - cover only mode */
.card{background:#16161a;border-radius:10px;overflow:hidden;position:relative;cursor:pointer}
.card-img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
.card-ph{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,#1e1e24,#222230);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:#8888a0}
.card-ph-ico{font-size:1.8rem}
.card-ph-txt{font-size:.65rem;text-transform:uppercase;letter-spacing:1px}
.card-badge{position:absolute;top:5px;left:5px;font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:5px;text-transform:uppercase;letter-spacing:.3px}
.card-type-badge{position:absolute;top:5px;right:5px;font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:5px;background:rgba(0,0,0,.7);color:#f0eff4}
.card-info{padding:6px 4px 4px}
.card-info-title{font-size:.75rem;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-info-meta{font-size:.65rem;color:#8888a0;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-stars{font-size:.6rem;color:#2a2a35;margin-top:2px}
.card-stars .on{color:#e8c97a}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:#8888a0;grid-column:1/-1}
.empty-ico{font-size:2.5rem;opacity:.4;margin-bottom:10px}
.empty h3{font-size:1rem;color:#f0eff4;margin-bottom:6px}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:99;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#16161a;border:1px solid #2a2a35;border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;padding:20px 20px 36px}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-size:1.2rem;font-weight:700}
.xbtn{background:#1e1e24;border:1px solid #2a2a35;color:#8888a0;width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:.9rem}

/* TYPE TOGGLE IN MODAL */
.type-toggle{display:flex;background:#1e1e24;border:1px solid #2a2a35;border-radius:10px;padding:3px;gap:3px;margin-bottom:16px}
.ttogl{flex:1;text-align:center;padding:8px;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;background:none;color:#8888a0;transition:all .2s}
.ttogl.active{background:#e8c97a;color:#0d0d0f}

.field{margin-bottom:14px}
.field label{display:block;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:#8888a0;margin-bottom:5px}
.field input,.field select{width:100%;background:#1e1e24;border:1px solid #2a2a35;color:#f0eff4;font-family:system-ui,sans-serif;font-size:.88rem;padding:10px 13px;border-radius:10px;outline:none}
.field input:focus,.field select:focus{border-color:#e8c97a}
.field select option{background:#1e1e24}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.photo-zone{border:2px dashed #2a2a35;border-radius:11px;overflow:hidden;cursor:pointer;position:relative;min-height:80px;display:flex;align-items:center;justify-content:center;background:#1e1e24}
.photo-zone img{width:100%;height:140px;object-fit:cover;display:block}
.photo-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.ph-hint{text-align:center;color:#8888a0;pointer-events:none;padding:14px}
.ph-hint div:first-child{font-size:1.4rem;margin-bottom:4px}
.ph-hint div:last-child{font-size:.76rem}
.star-pick{display:flex;gap:4px;flex-wrap:wrap}
.sp{font-size:1.1rem;cursor:pointer;color:#2a2a35;transition:color .1s;user-select:none}
.sp.on{color:#e8c97a}
.modal-ftr{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.btn-c{background:#1e1e24;border:1px solid #2a2a35;color:#8888a0;font-family:system-ui,sans-serif;font-size:.82rem;padding:10px 18px;border-radius:100px;cursor:pointer}
.btn-s{background:linear-gradient(135deg,#e8c97a,#c87d4f);border:none;color:#0d0d0f;font-family:system-ui,sans-serif;font-size:.82rem;font-weight:700;padding:10px 22px;border-radius:100px;cursor:pointer}

/* Season field hidden for films */
.season-row{transition:opacity .2s}
.season-row.hidden{display:none}
</style>
</head>
<body>

<div class="header">
  <div class="logo">SeriesVault</div>
  <div class="header-right">
    <button class="add-btn" id="add-btn">＋ Ajouter</button>
  </div>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">Total</div></div>
  <div class="stat"><div class="stat-n" id="s-series" style="color:#e8c97a">0</div><div class="stat-l">Séries</div></div>
  <div class="stat"><div class="stat-n" id="s-films" style="color:#c87d4f">0</div><div class="stat-l">Films</div></div>
  <div class="stat"><div class="stat-n" id="s-cours" style="color:#5ecb8d">0</div><div class="stat-l">En cours</div></div>
</div>

<!-- Type tabs -->
<div class="type-tabs">
  <button class="ttab active" data-type="all">Tout</button>
  <button class="ttab" data-type="serie">📺 Séries</button>
  <button class="ttab" data-type="film">🎬 Films</button>
</div>

<!-- Status filters -->
<div class="status-bar">
  <button class="sbtn active" data-f="all"><span class="dot" style="background:#8888a0"></span>Tous</button>
  <button class="sbtn" data-f="en-cours"><span class="dot" style="background:#5ecb8d"></span>En cours</button>
  <button class="sbtn" data-f="finit"><span class="dot" style="background:#6ab0e8"></span>Finis</button>
  <button class="sbtn" data-f="en-pause"><span class="dot" style="background:#e8a45a"></span>En pause</button>
</div>

<!-- Sort + Grid size -->
<div class="controls">
  <select class="sort-select" id="sort-select">
    <option value="recent">📅 Ajout récent</option>
    <option value="alpha-az">🔤 A → Z</option>
    <option value="alpha-za">🔤 Z → A</option>
    <option value="note-desc">⭐ Note ↓</option>
    <option value="note-asc">⭐ Note ↑</option>
  </select>
  <div class="grid-ctrl">
    <span id="grid-label">3/ligne</span>
    <input type="range" id="grid-size" min="2" max="5" value="3" step="1">
  </div>
</div>

<div id="main-content"></div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="m-title">Nouveau</div>
      <button class="xbtn" id="x-btn">✕</button>
    </div>

    <!-- Type toggle -->
    <div class="type-toggle">
      <button class="ttogl active" data-t="serie" id="ttogl-serie">📺 Série</button>
      <button class="ttogl" data-t="film" id="ttogl-film">🎬 Film</button>
    </div>

    <div class="field">
      <label>Titre</label>
      <input id="f-title" type="text" placeholder="Ex: Breaking Bad" autocomplete="off">
    </div>
    <div class="field">
      <label>🖼️ Affiche</label>
      <div class="photo-zone">
        <input type="file" id="f-photo" accept="image/*">
        <div class="ph-hint" id="ph-hint"><div>🎬</div><div>Appuyer pour choisir</div></div>
        <img id="ph-img" style="display:none" alt="">
      </div>
    </div>
    <div class="field">
      <label>Statut</label>
      <select id="f-status">
        <option value="en-cours">🟢 En cours</option>
        <option value="finit">🔵 Fini</option>
        <option value="en-pause">🟠 En pause</option>
      </select>
    </div>
    <div class="two season-row" id="season-row">
      <div class="field">
        <label>📅 Saison</label>
        <input id="f-season" type="number" min="1" max="99" placeholder="1">
      </div>
      <div class="field">
        <label>🎞️ Épisode</label>
        <input id="f-episode" type="number" min="1" max="999" placeholder="1">
      </div>
    </div>
    <div class="field">
      <label>⭐ Note /10</label>
      <div class="star-pick" id="star-pick">
        <span class="sp" data-v="1">★</span><span class="sp" data-v="2">★</span>
        <span class="sp" data-v="3">★</span><span class="sp" data-v="4">★</span>
        <span class="sp" data-v="5">★</span><span class="sp" data-v="6">★</span>
        <span class="sp" data-v="7">★</span><span class="sp" data-v="8">★</span>
        <span class="sp" data-v="9">★</span><span class="sp" data-v="10">★</span>
      </div>
    </div>
    <div class="modal-ftr">
      <button class="btn-c" id="c-btn">Annuler</button>
      <button class="btn-s" id="s-btn">Enregistrer</button>
    </div>
  </div>
</div>

<script>
var items = [];
try { items = JSON.parse(localStorage.getItem('sv3') || '[]'); } catch(e){}

var filterStatus = 'all';
var filterType = 'all';
var sortMode = 'recent';
var gridCols = 3;
var editId = null;
var rating = 0;
var photo = null;
var modalType = 'serie';

var STATUS = {
  'en-cours': {label:'En cours', color:'#5ecb8d', bg:'rgba(94,203,141,.2)'},
  'finit':    {label:'Fini',     color:'#6ab0e8', bg:'rgba(106,176,232,.2)'},
  'en-pause': {label:'Pause',    color:'#e8a45a', bg:'rgba(232,164,90,.2)'}
};

function uid(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }
function saveData(){ try{ localStorage.setItem('sv3', JSON.stringify(items)); }catch(e){} }

function escHtml(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getSorted(data){
  var d = data.slice();
  if(sortMode==='alpha-az') d.sort(function(a,b){return a.title.localeCompare(b.title);});
  else if(sortMode==='alpha-za') d.sort(function(a,b){return b.title.localeCompare(a.title);});
  else if(sortMode==='note-desc') d.sort(function(a,b){return (b.rating||0)-(a.rating||0);});
  else if(sortMode==='note-asc') d.sort(function(a,b){return (a.rating||0)-(b.rating||0);});
  return d;
}

function updateStats(){
  document.getElementById('s-total').textContent = items.length;
  document.getElementById('s-series').textContent = items.filter(function(x){return x.type==='serie';}).length;
  document.getElementById('s-films').textContent = items.filter(function(x){return x.type==='film';}).length;
  document.getElementById('s-cours').textContent = items.filter(function(x){return x.status==='en-cours';}).length;
}

function renderGrid(data, container){
  if(data.length===0){
    container.innerHTML = '<div class="empty"><div class="empty-ico">📺</div><h3>Rien ici</h3><p>Ajoute ton premier contenu !</p></div>';
    return;
  }
  container.style.gridTemplateColumns = 'repeat('+gridCols+', 1fr)';
  container.innerHTML = '';
  getSorted(data).forEach(function(s){
    var st = STATUS[s.status];
    var card = document.createElement('div');
    card.className = 'card';

    var poster = '';
    if(s.photo){
      poster = '<img class="card-img" src="'+s.photo+'" alt="">';
    } else {
      poster = '<div class="card-ph"><div class="card-ph-ico">'+(s.type==='film'?'🎬':'📺')+'</div><div class="card-ph-txt">'+escHtml(s.title.slice(0,8))+'</div></div>';
    }

    var stars = '';
    for(var j=1;j<=10;j++) stars += '<span class="'+(j<=s.rating?'on':'')+'">★</span>';

    var epInfo = '';
    if(s.type==='serie' && (s.season||s.episode)){
      epInfo = 'S'+(s.season||'?')+' E'+(s.episode||'?');
    }

    card.innerHTML = poster
      + '<span class="card-badge" style="background:'+st.bg+';color:'+st.color+'">'+st.label+'</span>'
      + '<span class="card-type-badge">'+(s.type==='film'?'Film':'Série')+'</span>'
      + '<div class="card-info">'
      + '<div class="card-info-title">'+escHtml(s.title)+'</div>'
      + (epInfo ? '<div class="card-info-meta">'+epInfo+'</div>' : '')
      + '<div class="card-stars">'+stars+'</div>'
      + '</div>';

    card.querySelector('.card-badge').addEventListener('click', function(e){ e.stopPropagation(); });

    // Edit on long press, delete button
    var pressTimer;
    card.addEventListener('touchstart', function(){ pressTimer = setTimeout(function(){ showCardMenu(s.id); }, 600); });
    card.addEventListener('touchend', function(){ clearTimeout(pressTimer); });
    card.addEventListener('click', function(){ openModal(s.id); });

    container.appendChild(card);
  });
}

function showCardMenu(id){
  var s = items.find(function(x){return x.id===id;});
  if(!s) return;
  if(confirm('"'+s.title+'"\n\nAppuie OK pour modifier, Annuler pour supprimer')){
    openModal(id);
  } else {
    if(confirm('Supprimer "'+s.title+'" ?')){
      items = items.filter(function(x){return x.id!==id;});
      saveData(); render();
    }
  }
}

function render(){
  var content = document.getElementById('main-content');
  content.innerHTML = '';

  var filtered = items.filter(function(s){
    var okType = filterType==='all' || s.type===filterType;
    var okStatus = filterStatus==='all' || s.status===filterStatus;
    return okType && okStatus;
  });

  if(filterType==='all'){
    // Show series section then films section
    var seriesData = filtered.filter(function(x){return x.type==='serie';});
    var filmsData = filtered.filter(function(x){return x.type==='film';});

    if(seriesData.length>0 || filmsData.length>0){
      if(seriesData.length>0){
        var st = document.createElement('div');
        st.className = 'section-title';
        st.textContent = '📺 Séries ('+seriesData.length+')';
        content.appendChild(st);
        var sg = document.createElement('div');
        sg.className = 'grid';
        content.appendChild(sg);
        renderGrid(seriesData, sg);
      }
      if(filmsData.length>0){
        var ft = document.createElement('div');
        ft.className = 'section-title';
        ft.textContent = '🎬 Films ('+filmsData.length+')';
        content.appendChild(ft);
        var fg = document.createElement('div');
        fg.className = 'grid';
        content.appendChild(fg);
        renderGrid(filmsData, fg);
      }
    } else {
      content.innerHTML = '<div class="empty"><div class="empty-ico">📺</div><h3>Rien ici</h3><p>Ajoute ton premier contenu !</p></div>';
    }
  } else {
    var g = document.createElement('div');
    g.className = 'grid';
    content.appendChild(g);
    renderGrid(filtered, g);
  }

  updateStats();
}

// MODAL
function setRating(v){
  rating=v;
  document.querySelectorAll('.sp').forEach(function(s){
    s.classList.toggle('on', parseInt(s.getAttribute('data-v'))<=v);
  });
}

function setModalType(t){
  modalType = t;
  document.querySelectorAll('.ttogl').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-t')===t); });
  document.getElementById('season-row').classList.toggle('hidden', t==='film');
  document.getElementById('m-title').textContent = editId ? 'Modifier' : (t==='film' ? 'Nouveau film' : 'Nouvelle série');
}

function openModal(id){
  editId = id||null; rating=0; photo=null;
  document.getElementById('f-title').value='';
  document.getElementById('f-status').value='en-cours';
  document.getElementById('f-season').value='';
  document.getElementById('f-episode').value='';
  document.getElementById('ph-img').style.display='none';
  document.getElementById('ph-hint').style.display='block';
  document.getElementById('f-photo').value='';
  setRating(0);
  setModalType('serie');

  if(id){
    var s=items.find(function(x){return x.id===id;});
    if(s){
      document.getElementById('f-title').value=s.title;
      document.getElementById('f-status').value=s.status;
      document.getElementById('f-season').value=s.season||'';
      document.getElementById('f-episode').value=s.episode||'';
      photo=s.photo||null; setRating(s.rating||0);
      setModalType(s.type||'serie');
      if(s.photo){
        document.getElementById('ph-img').src=s.photo;
        document.getElementById('ph-img').style.display='block';
        document.getElementById('ph-hint').style.display='none';
      }
    }
  }
  document.getElementById('overlay').classList.add('open');
}

function closeModal(){ document.getElementById('overlay').classList.remove('open'); }

// EVENTS
document.getElementById('add-btn').addEventListener('click', function(){ openModal(null); });
document.getElementById('x-btn').addEventListener('click', closeModal);
document.getElementById('c-btn').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

document.querySelectorAll('.ttab').forEach(function(b){
  b.addEventListener('click', function(){
    filterType=this.getAttribute('data-type');
    document.querySelectorAll('.ttab').forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');
    render();
  });
});

document.querySelectorAll('.sbtn').forEach(function(b){
  b.addEventListener('click', function(){
    filterStatus=this.getAttribute('data-f');
    document.querySelectorAll('.sbtn').forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');
    render();
  });
});

document.getElementById('sort-select').addEventListener('change', function(){
  sortMode=this.value; render();
});

document.getElementById('grid-size').addEventListener('input', function(){
  gridCols=parseInt(this.value);
  document.getElementById('grid-label').textContent=gridCols+'/ligne';
  render();
});

document.querySelectorAll('.ttogl').forEach(function(b){
  b.addEventListener('click', function(){ setModalType(this.getAttribute('data-t')); });
});

document.querySelectorAll('.sp').forEach(function(s){
  s.addEventListener('click', function(){ setRating(parseInt(this.getAttribute('data-v'))); });
  s.addEventListener('mouseover', function(){
    var v=parseInt(this.getAttribute('data-v'));
    document.querySelectorAll('.sp').forEach(function(x){ x.classList.toggle('on', parseInt(x.getAttribute('data-v'))<=v); });
  });
  s.addEventListener('mouseout', function(){
    document.querySelectorAll('.sp').forEach(function(x){ x.classList.toggle('on', parseInt(x.getAttribute('data-v'))<=rating); });
  });
});

document.getElementById('f-photo').addEventListener('change', function(e){
  var file=e.target.files[0]; if(!file) return;
  var r=new FileReader();
  r.onload=function(ev){
    photo=ev.target.result;
    document.getElementById('ph-img').src=photo;
    document.getElementById('ph-img').style.display='block';
    document.getElementById('ph-hint').style.display='none';
  };
  r.readAsDataURL(file);
});

document.getElementById('s-btn').addEventListener('click', function(){
  var t=document.getElementById('f-title').value.trim();
  if(!t){ document.getElementById('f-title').focus(); return; }
  var obj={
    id: editId||uid(),
    title:t,
    type: modalType,
    status:document.getElementById('f-status').value,
    season: modalType==='serie' ? (parseInt(document.getElementById('f-season').value)||null) : null,
    episode: modalType==='serie' ? (parseInt(document.getElementById('f-episode').value)||null) : null,
    rating:rating,
    photo:photo
  };
  if(editId){
    var idx=items.findIndex(function(x){return x.id===editId;});
    if(idx!==-1) items[idx]=obj;
  } else { items.unshift(obj); }
  saveData(); closeModal(); render();
});

render();
</script>
</body>
</html>
